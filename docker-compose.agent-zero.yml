version: '3.8'

services:
  # Agent Zero (Praxis Agent Carbon) Web UI
  agent-zero:
    image: agent0ai/agent-zero:latest
    container_name: praxis-agent-zero-ui
    restart: unless-stopped
    ports:
      - "5000:80"      # Web UI
      - "2222:22"      # SSH (optional)
    volumes:
      - ./agent-zero:/git/agent-zero:rw
      - agent-zero-data:/root/
    environment:
      - BRANCH=local
    networks:
      - praxis-agent-network

volumes:
  agent-zero-data:
    driver: local

networks:
  praxis-agent-network:
    driver: bridge
