version: '3.8'

services:
  # Shared database for testing
  postgres:
    image: postgres:15-alpine
    container_name: praxis-postgres-test
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-praxis_agent_carbon}
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
      - ./deploy/docker-init/db/db-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./deploy/docker-init/db/jwt.sql:/docker-entrypoint-initdb.d/02-jwt.sql
      - ./deploy/docker-init/db/postgresql.conf:/etc/postgresql/postgresql.conf
    ports:
      - "5435:5432"
    networks:
      - praxis-test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgREST for API layer
  postgrest:
    image: postgrest/postgrest:v12.2.12
    container_name: praxis-postgrest-test
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-praxis_agent_carbon}
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:5431
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-dev-secret-please-change-in-production}
      PGRST_DB_CHANNEL_ENABLED: true
      PGRST_DB_CHANNEL: pgrst
    ports:
      - "5431:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - praxis-test-network

  # Swarm orchestrator
  swarm:
    image: praxis-swarm:latest
    container_name: praxis-swarm-test
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ./nanoclaw:/app/source
      - ./swarm-workspace-test/groups:/workspace/groups
      - ./swarm-workspace-test/global:/workspace/global
      - ./swarm-workspace-test/extra:/workspace/extra
      - ./swarm-workspace-test/ipc:/workspace/ipc
    ports:
      - "3001:3000"
    environment:
      - GROUP_FOLDER_PATH=/workspace/groups
      - GLOBAL_FOLDER_PATH=/workspace/global
      - EXTRA_FOLDER_PATH=/workspace/extra
      - IPC_PATH=/workspace/ipc
      - TRIGGER_WORD=@Andy
      - DEFAULT_MODEL=claude-opus-4-1-20250805
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-praxis_agent_carbon}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-please-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - praxis-test-network

volumes:
  postgres-test-data:
    driver: local

networks:
  praxis-test-network:
    driver: bridge
