version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: praxis-postgres-local
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=praxis_agent_carbon
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
      - ./deploy/docker-init/db/db-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./deploy/docker-init/db/jwt.sql:/docker-entrypoint-initdb.d/02-jwt.sql
      - ./deploy/docker-init/db/postgresql.conf:/etc/postgresql/postgresql.conf
    ports:
      - "5436:5432"
    networks:
      - praxis-local-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgREST API
  postgrest:
    image: postgrest/postgrest:v12.2.12
    container_name: praxis-postgrest-local
    restart: unless-stopped
    environment:
      - PGRST_DB_URI=postgres://postgres:postgres@postgres:5432/praxis_agent_carbon
      - PGRST_OPENAPI_SERVER_PROXY_URI=http://localhost:5432
      - PGRST_DB_SCHEMA=public
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_JWT_SECRET=dev-secret-please-change-in-production-minimum-32-characters
      - PGRST_DB_CHANNEL_ENABLED=true
      - PGRST_DB_CHANNEL=pgrst
    ports:
      - "5437:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - praxis-local-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer (Database UI)
  adminer:
    image: adminer:latest
    container_name: praxis-adminer-local
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
      - ADMINER_DESIGN=pepa-linha
    depends_on:
      - postgres
    networks:
      - praxis-local-network

volumes:
  postgres-local-data:
    driver: local

networks:
  praxis-local-network:
    driver: bridge
