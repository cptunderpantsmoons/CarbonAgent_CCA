# PostgreSQL Configuration for Praxis Agent Carbon Platform
# Optimized for multi-tenant AI agent platform with high concurrency

# ============================================================================
# CONNECTION SETTINGS
# ============================================================================

# Listen on all interfaces for Docker networking
listen_addresses = '*'

# Maximum number of concurrent connections
max_connections = 200

# Shared memory for PostgreSQL
shared_buffers = 256MB              # 25% of RAM typically
effective_cache_size = 1GB          # 50-75% of RAM
maintenance_work_mem = 64MB
work_mem = 16MB                     # Per-operation memory

# ============================================================================
# WRITE AHEAD LOG (WAL)
# ============================================================================

# WAL settings for balance between performance and reliability
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min

# WAL archiving (optional - for backup/replication)
# archive_mode = on
# archive_command = 'cp %p /var/lib/postgresql/wal_archive/%f'

# ============================================================================
# QUERY PLANNING AND PERFORMANCE
# ============================================================================

# Query planning
random_page_cost = 1.1              # For SSD storage
effective_io_concurrency = 200      # For SSD storage
seq_page_cost = 1.0

# Parallel query processing
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
parallel_tuple_cost = 0.1
parallel_setup_cost = 1000.0

# Join operations
join_collapse_limit = 10
from_collapse_limit = 10

# ============================================================================
# LOGGING AND MONITORING
# ============================================================================

# Log destination
logging_collector = off
# Log to stderr instead (Docker will capture this)
# log_directory = '/var/log/postgresql'
# log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
# log_file_mode = 0600

# Log levels
log_min_duration_statement = 1000   # Log slow queries (>1s)
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_duration = off
log_lock_waits = on

# Log rotation
log_rotation_age = 1d
log_rotation_size = 100MB

# ============================================================================
# STATISTICS AND ANALYZE
# ============================================================================

# Statistics collection
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# Auto-analyze and vacuum
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s

# Aggressive autovacuum for high-write workloads
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# ============================================================================
# CLIENT CONNECTION DEFAULTS
# ============================================================================

# Default behavior for client connections
client_min_messages = notice
default_text_search_config = 'pg_catalog.english'

# Statement timeout (prevent runaway queries)
statement_timeout = 30000            # 30 seconds
lock_timeout = 5000                  # 5 seconds
idle_in_transaction_session_timeout = 60000  # 60 seconds

# ============================================================================
# SECURITY SETTINGS
# ============================================================================

# Encryption key for application-level encryption
# This is used by InsForge for encrypting sensitive data
app.encryption_key = 'change-this-in-production-use-32-char-min'

# Authentication
authentication_timeout = 1min
password_encryption = scram-sha-256

# ============================================================================
# EXTENSIONS AND PLUGINS
# ============================================================================

# Shared preload libraries (required for extensions)
shared_preload_libraries = 'pg_stat_statements'

# pg_stat_statements configuration
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# ============================================================================
# SPECIFIC TUNING FOR PRAXIS AGENT CARBON
# ============================================================================

# Vector similarity search optimization (for agent memories)
# These settings optimize pgvector operations
# Note: requires pgvector extension to be installed

# Enable JIT compilation for complex queries
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# ============================================================================
# PARTITIONING (Future Enhancement)
# ============================================================================

# Enable partition pruning for partitioned tables
# Useful for large-scale deployments with lots of agents/memories
# partition_pruning = on  # (default: on)

# ============================================================================
# REPLICATION (Optional - for HA setups)
# ============================================================================

# Streaming replication settings (if needed)
# wal_sender_timeout = 60s
# wal_receiver_status_interval = 10s
# hot_standby_feedback = on

# ============================================================================
# MONITORING VIEWS
# ============================================================================

# Create pg_stat_statements extension for query performance monitoring
# Should be run manually: CREATE EXTENSION IF NOT EXISTS pg_stat_statements;

# ============================================================================
# CUSTOM CONFIGURATION NOTES
# ============================================================================

# For production deployments:
# 1. Adjust shared_buffers based on available RAM (25-40% of RAM)
# 2. Increase effective_cache_size to 50-75% of RAM
# 3. Tune max_connections based on expected concurrent users
# 4. Enable WAL archiving for point-in-time recovery
# 5. Set up monitoring with pg_stat_statements
# 6. Review and adjust work_mem based on query complexity
# 7. Consider partitioning for high-volume tables (memories, messages)

# For development/testing:
# 1. Lower max_connections to 50
# 2. Reduce shared_buffers to 128MB
# 3. Disable WAL archiving
# 4. Increase log_min_duration_statement to capture slow queries
# 5. Set statement_timeout higher to allow complex development queries

