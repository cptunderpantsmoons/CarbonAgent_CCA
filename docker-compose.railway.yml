version: '3.8'

services:
  # Shared database for both systems
  postgres:
    image: ghcr.io/insforge/postgres:v15.13.2
    container_name: praxis-postgres
    command: postgres -c config_file=/etc/postgresql/postgresql.conf -c app.encryption_key='${ENCRYPTION_KEY:-${JWT_SECRET:-dev-secret-please-change-in-production}}'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-praxis_agent_carbon}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/docker-init/db/db-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./deploy/docker-init/db/jwt.sql:/docker-entrypoint-initdb.d/02-jwt.sql
      - ./deploy/docker-init/db/postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      - praxis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgREST for InsForge API layer
  postgrest:
    image: postgrest/postgrest:v12.2.12
    container_name: praxis-postgrest
    restart: unless-stopped
    environment:
      # POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # POSTGRES_DB: ${POSTGRES_DB:-praxis_agent_carbon}
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-praxis_agent_carbon}
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3000
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-dev-secret-please-change-in-production}
      # Enable schema reloading via NOTIFY
      PGRST_DB_CHANNEL_ENABLED: true
      PGRST_DB_CHANNEL: pgrst
    networks:
      - praxis-network

  # InsForge main application
  insforge:
    build:
      context: ./insforge
      dockerfile: Dockerfile
      target: dev
    image: praxis-insforge-dev
    container_name: praxis-insforge
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7131:7131"   # Expose only the UI port (7131) - Railway will assign a host port
    environment:
      - PORT=7130
      - PROJECT_ROOT=/app
      - API_BASE_URL=${API_BASE_URL:-}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-please-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-this-password}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      # S3-specific credentials (for Wasabi, MinIO, etc. — falls back to AWS_* if not set)
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      # Storage limits
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-}
      # PostgreSQL connection
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-praxis_agent_carbon}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-praxis_agent_carbon}
      - POSTGREST_BASE_URL=http://postgrest:3000
      # Deno Runtime URL for serverless functions
      - DENO_RUNTIME_URL=http://deno:7133
      # Deno Subhosting Configuration
      - DENO_SUBHOSTING_TOKEN=${DENO_SUBHOSTING_TOKEN:-}
      - DENO_SUBHOSTING_ORG_ID=${DENO_SUBHOSTING_ORG_ID:-}
      # Storage Configuration
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-}
      - AWS_REGION=${AWS_REGION:-}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - AWS_CLOUDFRONT_URL=${AWS_CLOUDFRONT_URL:-}
      - AWS_CLOUDFRONT_KEY_PAIR_ID=${AWS_CLOUDFRONT_KEY_PAIR_ID:-}
      - AWS_CLOUDFRONT_PRIVATE_KEY=${AWS_CLOUDFRONT_PRIVATE_KEY:-}
      # Multi-tenant Cloud Configuration
      - DEPLOYMENT_ID=${DEPLOYMENT_ID:-}
      - PROJECT_ID=${PROJECT_ID:-}
      - APP_KEY=${APP_KEY:-}
      - ACCESS_API_KEY=${ACCESS_API_KEY:-}
      - CLOUD_API_HOST=${CLOUD_API_HOST:-}
      # LLM Model API keys
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # OAuth Configuration
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID:-}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET:-}
      - X_CLIENT_ID=${X_CLIENT_ID:-}
      - X_CLIENT_SECRET=${X_CLIENT_SECRET:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_CLIENT_SECRET=${APPLE_CLIENT_SECRET:-}
      # Logs directory
      - LOGS_DIR=/insforge-logs
      # Storage directory (for local file storage when S3 is not configured)
      - STORAGE_DIR=/insforge-storage
      # Auth app URL for development proxy
      - AUTH_APP_URL=${AUTH_APP_URL:-http://localhost:7132}
    volumes:
      - ./insforge/package.json:/app/package.json
      - ./insforge/backend:/app/backend
      - ./insforge/frontend:/app/frontend
      - ./insforge/auth:/app/auth
      - ./insforge/shared-schemas:/app/shared-schemas
      - ./insforge/ui:/app/ui
      - ./insforge/docs:/app/docs
      - node_modules:/app/node_modules
      - backend_node_modules:/app/backend/node_modules
      - frontend_node_modules:/app/frontend/node_modules
      - auth_node_modules:/app/auth/node_modules
      - shared_schemas_node_modules:/app/shared-schemas/node_modules
      - ui_node_modules:/app/ui/node_modules
      - shared-logs:/insforge-logs
      - storage-data:/insforge-storage
    command: sh -c "npm install && cd backend && npm run migrate:up && cd .. && npm run dev"
    restart: unless-stopped
    networks:
      - praxis-network

  # Deno serverless runtime for edge functions
  deno:
    image: denoland/deno:alpine-2.0.6
    container_name: praxis-deno
    working_dir: /app
    depends_on:
      - postgres
      - postgrest
    networks:
      - praxis-network
    # No ports exposed - internal service
    environment:
      - PORT=7133
      - DENO_ENV=${DENO_ENV:-development}
      - DENO_DIR=/deno-dir
      # PostgreSQL connection
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-praxis_agent_carbon}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGREST_BASE_URL=http://postgrest:3000
      # Worker timeout (60 seconds default)
      - WORKER_TIMEOUT_MS=${WORKER_TIMEOUT_MS:-60000}
      # Encryption keys for decrypting function secrets
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-please-change-in-production}
    volumes:
      - ./insforge/functions:/app/functions
      - deno_cache:/deno-dir
    command: >
      sh -c "
        echo 'Downloading Deno dependencies...' &&
        deno cache functions/server.ts &&
        echo 'Starting Deno server on port 7133...' &&
        deno run --allow-net --allow-env --allow-read=./functions/worker-template.js --watch functions/server.ts
      "
    restart: unless-stopped

  # Vector.dev for log collection and shipping
  vector:
    container_name: praxis-vector
    image: timberio/vector:0.28.1-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_started
      insforge:
        condition: service_started
      deno:
        condition: service_started
    networks:
      - praxis-network
    # No ports exposed - internal service
    volumes:
      - ./insforge/deploy/docker-init/logs/vector.yml:/etc/vector/vector.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - shared-logs:/insforge-logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7135/health"]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-skip}
      - PROJECT_ID=${PROJECT_ID:-}
      - HOSTNAME_OVERRIDE=${HOSTNAME_OVERRIDE:-}
    command: ["--config", "/etc/vector/vector.yml"]

  # Praxis Agent Carbon (formerly Agent Zero)
  praxis-agent-carbon:
    build:
      context: ./agent-zero
      dockerfile: DockerfileLocal
    image: praxis-agent-carbon:latest
    container_name: praxis-agent-carbon
    networks:
      - praxis-network
    # Expose only the WebUI port (80) - Railway will assign a host port
    ports:
      - "80:80"
    volumes:
      - ./agent-zero:/git/agent-zero
      - ./agent-zero/docker/run/fs/:/root/
    environment:
      - BRANCH=local

  # Swarm (nanoclaw orchestrator - rebranded)
  swarm:
    build:
      context: ./nanoclaw
      dockerfile: Dockerfile.swarm
    image: praxis-swarm:latest
    container_name: praxis-swarm
    privileged: true  # Required for Docker-in-Docker to work properly
    networks:
      - praxis-network
    # No ports exposed - internal service (interacts via Docker socket)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw  # Docker socket to spawn agent containers
      - ./nanoclaw-package.json:/app/package.json  # Use nanoclaw's package.json
      - ./nanoclaw:/app/source  # Source code
      - ./swarm-workspace/groups:/workspace/groups  # Group workspaces
      - ./swarm-workspace/global:/workspace/global  # Global workspace
      - ./swarm-workspace/extra:/workspace/extra  # Extra workspace
      - ./swarm-workspace/ipc:/workspace/ipc  # IPC communication
      - swarm-node-modules:/app/node_modules  # Node modules volume
    environment:
      - GROUP_FOLDER_PATH=/workspace/groups
      - GLOBAL_FOLDER_PATH=/workspace/global
      - EXTRA_FOLDER_PATH=/workspace/extra
      - IPC_PATH=/workspace/ipc
      - TRIGGER_WORD=@Andy
      - DEFAULT_MODEL=claude-opus-4-1-20250805
      # Pass through relevant environment variables from the main .env file
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-praxis_agent_carbon}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-please-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-}
      - AWS_REGION=${AWS_REGION:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID:-}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET:-}
      - X_CLIENT_ID=${X_CLIENT_ID:-}
      - X_CLIENT_SECRET=${X_CLIENT_SECRET:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_CLIENT_SECRET=${APPLE_CLIENT_SECRET:-}
      - LOGS_DIR=/swarm-logs
      - STORAGE_DIR=/swarm-storage
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
    driver: local
  node_modules:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
  auth_node_modules:
    driver: local
  shared_schemas_node_modules:
    driver: local
  ui_node_modules:
    driver: local
  deno_cache:
    driver: local
  shared-logs:
    driver: local
  storage-data:
    driver: local
  swarm-node-modules:
    driver: local

networks:
  praxis-network:
    driver: bridge